name: bike_nav
description: Sistema de navegación para bicicleta con LEDs Bluetooth y voz en español.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Mapas y rutas
  google_maps_flutter: ^2.5.3
  flutter_polyline_points: ^2.0.0

  # Geolocalización
  geolocator: ^11.0.0

  # Bluetooth clásico (SPP) — compatible con v2 embedding
  bluetooth_classic: ^0.0.4

  # Mantener pantalla encendida durante navegación
  wakelock_plus: ^1.2.8

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # HTTP para Google Directions API
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
